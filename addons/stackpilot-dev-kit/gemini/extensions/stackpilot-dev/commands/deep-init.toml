description = "Map the current repository before long-running implementation or migration work."
prompt = """
Use this command before complex delivery, migration, or cross-session work.

Objective:
$ARGUMENTS

Protocol:
1. Scan the repository instructions, README, source layout, build files, tests, CI, and likely entrypoints.
2. Identify source-of-truth config, generated artifacts, auth/session boundaries, and external services.
3. Build a compact project map: modules, responsibilities, dependency hotspots, and risky ownership boundaries.
4. Capture the smallest credible verification commands before implementation begins.
5. If the work needs a durable record, prefer `record-work` or `stack-pilot internal task-state` over inventing provider-specific state files.
6. Do not create AGENTS.md files or broad generated docs unless the user explicitly asks for that output.

Response:
- Deep Init Summary
- Project Map
- Guardrails
- Verification Plan
- Recommended Next Command
"""
