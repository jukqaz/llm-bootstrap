version: '3'

vars:
  CARGO: cargo

includes: {}


tasks:
  skills-index:
    desc: Generate SKILLS.md
    cmds:
      - '{{.CARGO}} run --manifest-path skills/skill-indexer/scripts/skill-indexer/Cargo.toml --'

  skills-index-check:
    desc: Check SKILLS.md is up to date
    cmds:
      - '{{.CARGO}} run --manifest-path skills/skill-indexer/scripts/skill-indexer/Cargo.toml -- --check'

  doc-links:
    desc: Update AGENTS/README document lists
    cmds:
      - '{{.CARGO}} run --manifest-path skills/doc-linker/scripts/doc-linker/Cargo.toml -- --write'

  doc-links-check:
    desc: Check AGENTS/README document lists
    cmds:
      - '{{.CARGO}} run --manifest-path skills/doc-linker/scripts/doc-linker/Cargo.toml -- --check --fail-on-missing'

  validate-skills:
    desc: Validate skills structure and references
    cmds:
      - '{{.CARGO}} run --manifest-path skills/skill-validator/scripts/skill-validator/Cargo.toml --'

  check:
    desc: Run all checks
    deps: [skills-index-check, doc-links-check, validate-skills]

  skill-suggest:
    desc: Recommend skills by keyword text
    cmds:
      - '{{.CARGO}} run --manifest-path skills/role-dispatcher/scripts/recommend-skills/Cargo.toml -- --text "{{.TEXT}}"'

  skill-suggest-file:
    desc: Recommend skills from a file
    cmds:
      - '{{.CARGO}} run --manifest-path skills/role-dispatcher/scripts/recommend-skills/Cargo.toml -- --file "{{.FILE}}"'
