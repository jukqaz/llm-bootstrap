version: "3"

tasks:
  check:
    desc: Validate wrapper and Rust bootstrap build
    cmds:
      - bash -n install.sh
      - bash -n uninstall.sh
      - cargo check
      - cargo clippy --all-targets --all-features -- -D warnings
      - cargo test

  doctor:
    desc: Inspect expected provider files and commands after apply
    cmds:
      - cargo run -- doctor

  run:
    desc: Apply unified baseline to Codex and Gemini homes
    cmds:
      - ./install.sh --mode merge

  uninstall:
    desc: Remove llm-bootstrap managed home artifacts
    cmds:
      - ./uninstall.sh
