name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --generate-notes
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest

      - name: Upload release installer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "install-release.sh" \
            --clobber

  build-and-upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package archive
        run: |
          package_root="stackpilot-${GITHUB_REF_NAME}-${{ matrix.target }}"
          latest_archive="stackpilot-${{ matrix.target }}.tar.gz"
          latest_checksum="dist/${latest_archive}.sha256"
          mkdir -p "dist/${package_root}"
          cp target/release/stack-pilot "dist/${package_root}/"
          cp target/release/sp "dist/${package_root}/"
          cp bootstrap.toml install.sh install-release.sh uninstall.sh README.md README.ko.md LICENSE "dist/${package_root}/"
          cp -R templates addons bundles "dist/${package_root}/"
          mkdir -p "dist/${package_root}/.agents/plugins"
          cp .agents/plugins/marketplace.json "dist/${package_root}/.agents/plugins/marketplace.json"
          tar -C dist -czf "dist/${package_root}.tar.gz" "${package_root}"
          shasum -a 256 "dist/${package_root}.tar.gz" > "dist/${package_root}.tar.gz.sha256"
          cp "dist/${package_root}.tar.gz" "dist/${latest_archive}"
          shasum -a 256 "dist/${latest_archive}" > "$latest_checksum"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "dist/stackpilot-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" \
            "dist/stackpilot-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz.sha256" \
            "dist/stackpilot-${{ matrix.target }}.tar.gz" \
            "dist/stackpilot-${{ matrix.target }}.tar.gz.sha256" \
            --clobber
