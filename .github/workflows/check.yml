name: check

on:
  push:
    branches:
      - main
  pull_request: {}

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Task
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -b ./bin
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Run checks
        id: check
        continue-on-error: true
        env:
          TASK_COLOR: "0"
          NO_COLOR: "1"
          TERM: dumb
        run: |
          set +e
          task check > task-check.log 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Prepare report
        if: github.event_name == 'pull_request'
        env:
          EXIT_CODE: ${{ steps.check.outputs.exit_code }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import textwrap
          from pathlib import Path

          exit_code = os.environ.get("EXIT_CODE", "1")
          log_path = Path("task-check.log")
          content = log_path.read_text(encoding="utf-8") if log_path.exists() else ""
          ansi_re = re.compile(r"\x1b\[[0-9;]*m")
          lines = [ansi_re.sub("", line) for line in content.splitlines()]
          max_lines = 120
          snippet = "\n".join(lines[-max_lines:]) if lines else "(no output)"
          status = "PASS" if exit_code == "0" else "FAIL"
          summary_patterns = (
              "Doc lists are out of date",
              "Missing docs:",
              "ERROR:",
              "WARN:",
              "task: Failed",
              "::error",
          )
          summary = []
          for line in lines:
              if any(pattern in line for pattern in summary_patterns):
                  summary.append(line)
          summary = summary[-6:]
          summary_block = "\n".join(f"- {line}" for line in summary) if summary else "- (no summary)"
          body = textwrap.dedent(f"""\
          <!-- task-check-report -->
          ### task check: {status}
          **Summary**
          {summary_block}

          **Log (last {max_lines} lines)**
          ```
          {snippet}
          ```
          """)
          Path("task-check-report.md").write_text(body, encoding="utf-8")
          PY

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('task-check-report.md', 'utf8');
            const marker = '<!-- task-check-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail on check error
        if: steps.check.outputs.exit_code != '0'
        run: exit 1
