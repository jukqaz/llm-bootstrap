name: check

on:
  push:
    branches:
      - main
  pull_request: {}

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            skills/**/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Task
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -b ./bin
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Run checks
        id: check
        continue-on-error: true
        env:
          TASK_COLOR: "0"
          NO_COLOR: "1"
          TERM: dumb
        run: |
          set +e
          task check > task-check.log 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Prepare report
        if: steps.check.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.check.outputs.exit_code }}
          LOG_PATH: task-check.log
          REPORT_PATH: task-check-report.md
          MAX_LINES: "120"
          SUMMARY_LINES: "6"
        run: |
          cargo run --manifest-path skills/github-pr-ci/scripts/task-check-report/Cargo.toml --

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('task-check-report.md', 'utf8');
            const marker = '<!-- task-check-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail on check error
        if: steps.check.outputs.exit_code != '0'
        run: exit 1
