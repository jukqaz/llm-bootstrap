[bootstrap]
providers = ["codex", "gemini"]
default_mode = "merge"
default_preset = "normal"

[external.rtk]
enabled = true

[mcp]
always_on = ["chrome-devtools"]

[[mcp.env_gated]]
name = "context7"
env = "CONTEXT7_API_KEY"

[[mcp.env_gated]]
name = "exa"
env = "EXA_API_KEY"

[[harnesses]]
name = "ralph-loop"
category = "core"
default_enabled = true
description = "Shared control loop for planning, execution, review, and verification."

[[harnesses]]
name = "ralph-plan"
category = "core"
default_enabled = true
description = "Explicit plan contract with owners, evidence, approval boundaries, and next-slice output."

[[harnesses]]
name = "delivery"
category = "development"
default_enabled = true
description = "Development harness for office hours, build plan, review, QA, and ship."

[[harnesses]]
name = "incident"
category = "quality"
default_enabled = true
description = "Incident and regression harness for triage, fix, and verification."

[[harnesses]]
name = "review-gate"
category = "quality"
default_enabled = true
description = "Quality gate harness for review, tests, and verification."

[[harnesses]]
name = "founder-loop"
category = "company"
default_enabled = false
description = "Founder and product loop for opportunity, wedge, and next-slice decisions."

[[harnesses]]
name = "operating-review"
category = "company"
default_enabled = false
description = "Company operating review harness for KPI, pipeline, and support narratives."

[[packs]]
name = "delivery-pack"
scope = "development"
lane = "core"
harnesses = ["ralph-loop", "ralph-plan", "delivery", "review-gate"]
mcp_servers = ["chrome-devtools", "context7"]
connectors = ["github", "linear"]
codex_surfaces = ["llm-dev-kit", "delivery-skills"]
gemini_surfaces = ["llm-bootstrap-dev", "delivery-commands"]
claude_surfaces = ["claude-skills", "delivery-skills"]
description = "Default software delivery pack."

[[packs]]
name = "incident-pack"
scope = "development"
lane = "core"
harnesses = ["incident", "review-gate"]
mcp_servers = ["chrome-devtools", "context7"]
connectors = ["github", "linear"]
codex_surfaces = ["llm-dev-kit", "incident-skills"]
gemini_surfaces = ["llm-bootstrap-dev", "incident-commands"]
claude_surfaces = ["claude-skills", "incident-skills"]
description = "Core incident response and regression pack."

[[packs]]
name = "founder-pack"
scope = "company"
lane = "optional"
harnesses = ["ralph-plan", "founder-loop", "operating-review"]
mcp_servers = ["exa"]
connectors = ["linear", "gmail", "calendar", "drive", "figma", "stitch"]
codex_surfaces = ["llm-dev-kit", "company-skills"]
gemini_surfaces = ["llm-bootstrap-dev", "company-commands"]
claude_surfaces = ["claude-skills", "company-skills"]
description = "Founder and product operating pack."

[[packs]]
name = "ops-pack"
scope = "company"
lane = "optional"
harnesses = ["ralph-plan", "operating-review"]
mcp_servers = ["exa"]
connectors = ["linear", "gmail", "calendar", "drive"]
codex_surfaces = ["llm-dev-kit", "company-skills"]
gemini_surfaces = ["llm-bootstrap-dev", "company-commands"]
claude_surfaces = ["claude-skills", "company-skills"]
description = "Weekly operating review and KPI pack."

[[presets]]
name = "light"
packs = ["delivery-pack"]
description = "Lean development baseline with the smallest delivery harness."

[[presets]]
name = "normal"
packs = ["delivery-pack", "incident-pack"]
description = "Default development baseline with delivery and incident coverage."

[[presets]]
name = "full"
packs = ["delivery-pack", "incident-pack", "founder-pack", "ops-pack"]
description = "Development plus company operating packs."

[[presets]]
name = "company"
packs = ["founder-pack", "ops-pack"]
description = "Company operating packs without the development delivery lane."

[[connectors]]
name = "github"
category = "delivery"
tool_source = "app"
access = "read-write"
approval = "on-write"
automation_allowed = true
description = "Repository, issue, and PR context for delivery, incident, and review loops."

[[connectors]]
name = "linear"
category = "delivery"
tool_source = "app"
access = "read-write"
approval = "on-write"
automation_allowed = true
description = "Project, issue, cycle, and roadmap context for delivery planning and company operating reviews."

[[connectors]]
name = "gmail"
category = "communication"
tool_source = "app"
access = "read-only"
approval = "on-write"
automation_allowed = true
description = "Email inbox context for founder briefs, pipeline review, and support digest."

[[connectors]]
name = "calendar"
category = "communication"
tool_source = "app"
access = "read-only"
approval = "on-write"
automation_allowed = true
description = "Calendar context for planning cadence, meetings, and operating review windows."

[[connectors]]
name = "drive"
category = "knowledge"
tool_source = "app"
access = "read-only"
approval = "on-write"
automation_allowed = true
description = "Shared document context for plans, market scans, and weekly operating artifacts."

[[connectors]]
name = "figma"
category = "design"
tool_source = "app"
access = "read-only"
approval = "on-write"
automation_allowed = false
description = "Design file, prototype, and handoff context for founder and product review loops."

[[connectors]]
name = "stitch"
category = "design"
tool_source = "app"
access = "read-only"
approval = "on-write"
automation_allowed = false
description = "Design exploration and generated UI concept context for founder and product review loops."

[[automations]]
name = "daily-founder-brief"
cadence = "daily"
packs = ["founder-pack"]
connectors = ["linear", "gmail", "calendar", "drive"]
artifact = "Founder Brief"
description = "Prepare a concise daily founder brief with calendar, inbox, and recent document context."

[[automations]]
name = "weekly-market-scan"
cadence = "weekly"
packs = ["founder-pack"]
connectors = ["linear", "gmail", "drive"]
artifact = "Market Scan"
description = "Build a weekly market scan and wedge update from recent external and internal signals."

[[automations]]
name = "weekly-operating-review"
cadence = "weekly"
packs = ["founder-pack", "ops-pack"]
connectors = ["linear", "gmail", "calendar", "drive"]
artifact = "Operating Review"
description = "Assemble a weekly operating review covering KPIs, pipeline, blockers, and actions."

[[automations]]
name = "weekly-pipeline-review"
cadence = "weekly"
packs = ["ops-pack"]
connectors = ["linear", "gmail", "calendar", "drive"]
artifact = "Pipeline Review"
description = "Summarize active pipeline, follow-ups, and schedule risk for the next operating week."

[[record_templates]]
name = "opportunity-record"
record_type = "OpportunityRecord"
stage = "discover"
packs = ["founder-pack"]
surfaces = ["local-docs", "github-issues"]
description = "Market, customer pain, wedge, and why-now record for founder review."

[[record_templates]]
name = "decision-record"
record_type = "DecisionRecord"
stage = "decide"
packs = ["founder-pack", "ops-pack"]
surfaces = ["local-docs", "github-issues"]
description = "Bounded decision record with options, rationale, owner, and review date."

[[record_templates]]
name = "project-record"
record_type = "ProjectRecord"
stage = "build"
packs = ["delivery-pack", "founder-pack"]
surfaces = ["local-docs", "github-issues"]
description = "Product brief, scope, milestone, artifact, and issue/PR link record."

[[record_templates]]
name = "task-record"
record_type = "TaskRecord"
stage = "build"
packs = ["delivery-pack", "incident-pack"]
surfaces = ["github-issues", "local-docs"]
description = "Execution unit record with next action, owner, status, and verification evidence."

[[record_templates]]
name = "support-record"
record_type = "SupportRecord"
stage = "launch"
packs = ["incident-pack", "founder-pack"]
surfaces = ["local-docs", "github-issues"]
description = "Customer inquiry, severity, reply draft, repro link, and resolution record."

[[record_templates]]
name = "growth-record"
record_type = "GrowthRecord"
stage = "validate"
packs = ["founder-pack"]
surfaces = ["local-docs", "github-issues"]
description = "Campaign, channel, hypothesis, result, and next experiment record."

[[record_templates]]
name = "ops-record"
record_type = "OpsRecord"
stage = "learn"
packs = ["ops-pack"]
surfaces = ["local-docs", "github-issues"]
description = "Weekly operating review record with KPI, pipeline, risk, decisions, and next bets."

[[record_templates]]
name = "risk-record"
record_type = "RiskRecord"
stage = "build"
packs = ["delivery-pack", "ops-pack"]
surfaces = ["local-docs", "github-issues"]
description = "Security, privacy, legal, finance, or release risk record with approval boundary."

[[record_templates]]
name = "handoff-record"
record_type = "HandoffRecord"
stage = "launch"
packs = ["delivery-pack", "incident-pack", "founder-pack", "ops-pack"]
surfaces = ["local-docs", "github-issues"]
description = "External runtime owner, object link, missing verification, and next-step record."
