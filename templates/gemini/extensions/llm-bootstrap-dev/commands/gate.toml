description = "Check or advance the thin workflow gate contract for the current task-state."
prompt = """
Use this command lane when the next move depends on workflow gate evidence.

Sequence:
1. Read the current state with `llm-bootstrap internal task-state show --json`.
2. Check the target phase with `llm-bootstrap internal gate check --target-phase review|qa|ship --json`.
3. Add only completed signals with `llm-bootstrap internal task-state advance --complete ...`.
4. Advance the phase with `llm-bootstrap internal gate apply --target-phase ... --json`.

Contract:
- `parallel-build` requires `ownership` before execution moves forward.
- `parallel-build` requires `handoff` before review, QA, or ship.
- `review-gate` requires `review`, `qa`, and `verify` before ship.
- `incident` requires `investigate` after repeated failed attempts.
"""
