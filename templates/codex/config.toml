#:schema https://developers.openai.com/codex/config-schema.json

developer_instructions = "This Codex home is tuned for software development in the Codex app. Prioritize code reading, implementation, debugging, refactoring, test writing, review, and verification. Prefer direct execution, evidence-backed conclusions, and compact status updates. Use subagents only for bounded work that materially improves engineering throughput or correctness."
model = "gpt-5.5"
model_provider = "openai"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
service_tier = "fast"
model_reasoning_summary = "detailed"
model_verbosity = "medium"
personality = "pragmatic"
suppress_unstable_features_warning = true
web_search = "live"
zsh_path = "/bin/zsh"

[tools.web_search]
context_size = "high"

[history]
persistence = "save-all"
max_bytes = 104857600

[agents]
max_depth = 2

[agents.triage]
description = "Low-cost intake role for routing, extraction, and concise context shaping."
config_file = "./agents/triage.toml"
nickname_candidates = ["Switch", "Router"]

[agents.planner]
description = "Planning-focused role for decomposition, sequencing, and handoff."
config_file = "./agents/planner.toml"
nickname_candidates = ["Atlas", "Helm"]

[agents."planner-1m"]
description = "Long-context planning role for very large inputs, multi-document synthesis, and strategy work."
config_file = "./agents/planner-1m.toml"
nickname_candidates = ["Atlas-LC", "Helm-LC"]

[agents.architect]
description = "System design, diagnosis, boundaries, and interfaces."
config_file = "./agents/architect.toml"
nickname_candidates = ["Oracle", "Northstar"]

[agents.reviewer]
description = "Review-focused role for bugs, regressions, and missing tests."
config_file = "./agents/reviewer.toml"
nickname_candidates = ["Audit", "Lint"]

[agents."reviewer-1m"]
description = "Long-context review role for large diffs, logs, and multi-file evidence review."
config_file = "./agents/reviewer-1m.toml"
nickname_candidates = ["Audit-LC", "Proof-LC"]

[agents."architect-1m"]
description = "Long-context architecture and diagnosis role for broad multi-file analysis."
config_file = "./agents/architect-1m.toml"
nickname_candidates = ["Oracle-LC", "Northstar-LC"]

[agents.executor]
description = "Code implementation, refactoring, and feature work."
config_file = "./agents/executor.toml"
nickname_candidates = ["Forge", "Builder"]

[agents."test-engineer"]
description = "Test-focused role for strategy, regression coverage, and test implementation."
config_file = "./agents/test-engineer.toml"
nickname_candidates = ["Probe", "Spec"]

[agents.explore]
description = "Codebase search, file mapping, and relationship tracing."
config_file = "./agents/explore.toml"
nickname_candidates = ["Scout", "Tracer"]

[agents."docs-researcher"]
description = "Official docs and version-sensitive API research role."
config_file = "./agents/docs-researcher.toml"
nickname_candidates = ["Index", "Source"]

[agents.verifier]
description = "Evidence-based completion and acceptance verification role."
config_file = "./agents/verifier.toml"
nickname_candidates = ["Proof", "Gate"]

[agents."frontend-app"]
description = "Web frontend role for user-facing and admin-facing applications."
config_file = "./agents/frontend-app.toml"
nickname_candidates = ["Canvas", "Pixel"]

[agents."mobile-app"]
description = "Mobile application role for Flutter, native, or cross-platform work."
config_file = "./agents/mobile-app.toml"
nickname_candidates = ["Beacon", "Skia"]

[agents."backend-service"]
description = "Backend role for APIs, data integrity, auth, and jobs."
config_file = "./agents/backend-service.toml"
nickname_candidates = ["Relay", "Kernel"]

[agents."platform-infra"]
description = "Platform and infrastructure role for CI/CD, deployment, and operations."
config_file = "./agents/platform-infra.toml"
nickname_candidates = ["Forge", "Pulse"]

[agents."security-reviewer"]
description = "Security review for trust boundaries, auth, and vulnerabilities."
config_file = "./agents/security-reviewer.toml"
nickname_candidates = ["Shield", "Sentinel"]

[agents."git-master"]
description = "Commit strategy, history hygiene, and branch operations."
config_file = "./agents/git-master.toml"
nickname_candidates = ["History", "Branch"]

[features]
apps = true
browser_use = true
codex_hooks = true
computer_use = true
enable_request_compression = true
fast_mode = true
in_app_browser = true
memories = true
multi_agent = true
personality = true
prevent_idle_sleep = true
shell_snapshot = true
shell_tool = true
skill_mcp_dependency_install = true
undo = true
unified_exec = true

[memories]
disable_on_external_context = false
generate_memories = true
use_memories = true

__CODEX_MCP_BLOCKS__

__CODEX_PLUGIN_BLOCKS__

[shell_environment_policy]
inherit = "core"
