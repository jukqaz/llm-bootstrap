id = "coding_context_cli"
name = "Coding Context CLI"
source_type = "tool"
status = "active"
provider_scope = ["cross-provider"]
categories = ["context-assembly", "rules", "workflow"]
weight = "optional"
summary = "Reference for separating durable rules from per-task context instead of stuffing both into every prompt."

