  "rule and task assembly",
  "write-rules mode",
  "agent-targeted output paths",
  "token-aware context shaping"
]

adoptable_parts = [
  "write durable rules into provider files",
  "keep current task context separate from long-lived rules",
  "treat rule rendering as a provider renderer concern"
]

do_not_copy = [
  "a second standalone runtime when source metadata can live in our catalog"
]

